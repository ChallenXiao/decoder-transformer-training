model:
  vocab_size: 50257
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false
  attn_impl: "naive"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  max_steps: 1000
  learning_rate: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  eval_interval: 100
  eval_iters: 20
  log_interval: 10

data:
  dataset_name: "roneneldan/TinyStories"
  train_samples: 50000
  val_samples: 2000

system:
  device: "auto"
  dtype: "float32"
  seed: 42
