model:
  vocab_size: 50257
  block_size: 128
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false
  attn_impl: "naive"

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  max_steps: 1000
  learning_rate: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  eval_interval: 100
  eval_iters: 20
  log_interval: 20
  checkpoint_dir: "checkpoints/tinystories_mps_1k"
  log_dir: "runs/tinystories_mps_1k"

data:
  train_bin: "data/processed/tinystories/train.bin"
  val_bin: "data/processed/tinystories/val.bin"

system:
  device: "auto"
  seed: 42
